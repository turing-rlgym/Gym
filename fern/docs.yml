instances:
  - url: https://gym.docs.buildwithfern.com/nemo/gym
    custom-domain: docs.nvidia.com/nemo/gym

check:
  rules:
    broken-links: error
    example-validation: warn
    missing-redirects: error

title: NeMo Gym

footer: ./components/CustomFooter.tsx

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

colors:
  accentPrimary:
    dark: "#76B900"
    light: "#76B900"
  background:
    light: "#FFFFFF"
    dark: "#000000"

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /
  right-text: NeMo Gym

favicon: ./assets/NVIDIA_symbol.svg

# NVIDIA Adobe Launch (docs.nvidia.com analytics; matches other NVIDIA Fern docs)
js:
  - url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
    strategy: beforeInteractive

css:
  - ./main.css

navbar-links:
  - type: github
    value: https://github.com/NVIDIA-NeMo/Gym

libraries:
  nemo-gym:
    input:
      git: https://github.com/NVIDIA-NeMo/Gym
      subpath: nemo_gym
    output:
      path: ./product-docs/nemo-gym/Full-Library-Reference
    lang: python

experimental:
  mdx-components:
    - ./components

versions:
  - display-name: Latest
    path: versions/latest.yml
    slug: latest
    availability: stable
  - display-name: "0.2"
    path: versions/v0.2.yml
    slug: v0.2
    availability: stable

redirects:
  # Generated by utils/generate_redirects.py — re-run from repo root; see scripts README
  - source: "nemo/gym/index.html"
    destination: "/latest"
  - source: "nemo/gym/index"
    destination: "/latest"
  - source: "nemo/gym/about/concepts/configuration-system.html"
    destination: "/about/concepts/configuration"
  - source: "nemo/gym/about/concepts/core-abstractions.html"
    destination: "/about/concepts/core-components"
  - source: "nemo/gym/get-started/setup-installation.html"
    destination: "/get-started/detailed-setup"
  - source: "nemo/gym/how-to-faq.html"
    destination: "/reference/faq"
  - source: "nemo/gym/infrastructure/aiohttp-vs-httpx.html"
    destination: "/infrastructure/engineering-notes/aiohttp-vs-httpx"
  - source: "nemo/gym/infrastructure/swe-rl-case-study.html"
    destination: "/infrastructure/engineering-notes/swe-rl-case-study"
