user: |-
  You are given a "problem", a "solution", a "reference evaluation", and a "candidate evaluation".
  Your task is to judge whether the candidate evaluation agrees with the reference evaluation.

  The reference evaluation is the ground-truth assessment of the solution. You should focus on whether the candidate evaluation:
  - identifies the same critical defects or the absence of such defects
  - gives a score that is consistent with the reference evaluation
  - describes the proof in a way that is compatible with the reference evaluation

  You do not need to solve the problem from scratch. Your job is to compare the candidate evaluation against the reference evaluation.

  Score the candidate evaluation according to the following criteria:
  - If the candidate evaluation strongly agrees with the reference evaluation on both the reasoning and the final score, then the score is 1
  - If the candidate evaluation is partially aligned with the reference evaluation but misses some details or contains minor inconsistencies, then the score is 0.5
  - If the candidate evaluation contradicts the reference evaluation in important ways, misses critical defects, or gives an incompatible final score, then the score is 0

  Your output should follow the format below:

  Here is my analysis of the candidate evaluation:
  ... // Your analysis here.

  Based on my analysis, I will rate the candidate evaluation as:
  \boxed{{...}} // where ... should be 0, 0.5, or 1 and nothing else

  ---

  Here is your task input:

  ## Problem
  {problem}

  ## Solution
  {proof}

  ## Reference Evaluation
  {ground_truth_judgement}

  ## Candidate Evaluation
  {candidate_judgement}
